<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Running Timer - Sync Voice</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        #round-info { font-size: 1.4rem; color: #666; margin-bottom: 5px; }
        #status { font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; height: 50px; }
        #timer { 
            font-size: 8rem; 
            font-weight: bold; 
            margin: 10px 0; 
            font-variant-numeric: tabular-nums;
        }
        .danger { color: #e74c3c; } 
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #start-btn { background-color: #27ae60; color: white; grid-column: span 2; }
        #pause-btn { background-color: #f39c12; color: white; }
        #reset-btn { background-color: #7f8c8d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="round-info">Round: 1 / 40</div>
    <div id="status">Ready?</div>
    <div id="timer">00</div>
    
    <div class="controls">
        <button id="start-btn" onclick="startTest()">Start Workout</button>
        <button id="pause-btn" onclick="togglePause()" disabled>Pause</button>
        <button id="reset-btn" onclick="resetTest()">Reset</button>
    </div>
</div>

<script>
    let currentRound = 1;
    let timeLeft = 0;
    let timerInterval;
    let isPaused = false;
    let isRunningUp = true; 

    const timerEl = document.getElementById('timer');
    const statusEl = document.getElementById('status');
    const roundEl = document.getElementById('round-info');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');

    // מנוע שריקה
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playWhistle() {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
        oscillator.stop(audioCtx.currentTime + 0.6);
    }

    // פונקציית דיבור מהירה ללא דיליי
    function speakSync(text) {
        window.speechSynthesis.cancel(); // מבטל דיבורים קודמים שתקועים בתור
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1.4; // דיבור מהיר יותר כדי להספיק בתוך השנייה
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
    }

    function getTimes(round) {
        let up, back;
        if (round <= 10) { up = 25; back = 35; }
        else if (round <= 20) { up = 25 - (round - 10); back = 35 + (round - 10); }
        else if (round <= 29) { up = 15 + (round - 20); back = 45 - (round - 20); }
        else { up = 25; back = 35; }
        return { up, back };
    }

    function updateUI() {
        timerEl.innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;
        roundEl.innerText = `Round: ${currentRound} / 40`;
        
        if (timeLeft <= 5 && timeLeft > 0) {
            timerEl.classList.add('danger');
            speakSync(timeLeft.toString()); 
        } else if (timeLeft === 0) {
            timerEl.classList.remove('danger');
            playWhistle(); 
        } else {
            timerEl.classList.remove('danger');
        }
    }

    function startTest() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        if (!isPaused) {
            currentRound = 1;
            isRunningUp = true;
            timeLeft = getTimes(currentRound).up;
            statusEl.innerText = "RUN!";
            updateUI();
        }
        isPaused = false;
        runTimer();
    }

    function runTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                setTimeout(handlePhaseSwitch, 900); 
            }
        }, 1000);
    }

    function handlePhaseSwitch() {
        const times = getTimes(currentRound);
        if (isRunningUp) {
            isRunningUp = false;
            timeLeft = times.back;
            statusEl.innerText = "RETURN";
            updateUI();
            runTimer();
        } else {
            currentRound++;
            if (currentRound > 40) {
                statusEl.innerText = "FINISHED!";
                pauseBtn.disabled = true;
            } else {
                isRunningUp = true;
                timeLeft = getTimes(currentRound).up;
                statusEl.innerText = "RUN!";
                updateUI();
                runTimer();
            }
        }
    }

    function togglePause() {
        if (!isPaused) {
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
            pauseBtn.innerText = "Resume";
            isPaused = true;
        } else {
            pauseBtn.innerText = "Pause";
            isPaused = false;
            runTimer();
        }
    }

    function resetTest() {
        clearInterval(timerInterval);
        window.speechSynthesis.cancel();
        currentRound = 1;
        timeLeft = 0;
        isPaused = false;
        isRunningUp = true;
        timerEl.innerText = "00";
        timerEl.classList.remove('danger');
        statusEl.innerText = "Ready?";
        roundEl.innerText = "Round: 1 / 40";
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        pauseBtn.innerText = "Pause";
    }
</script>

</body>
</html>
